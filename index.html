<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    body {
      font-family: 'Inter', sans-serif;
      position: relative;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.95), rgba(255,255,255,0) 34%),
        linear-gradient(180deg, #fcfaf6 0%, #f6efe6 52%, #faf8f5 100%);
      color: #3a2e28;
      min-height: 100vh;
      overflow-x: hidden;
      isolation: isolate;
    }

    canvas#bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 1;
    }

    .background-stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .background-stage::before {
      content: '';
      position: absolute;
      inset: -15%;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,255,255,0.92), transparent 30%),
        radial-gradient(circle at 50% 8%, rgba(227,198,160,0.36), transparent 24%),
        radial-gradient(circle at 80% 12%, rgba(214,182,143,0.28), transparent 28%),
        linear-gradient(120deg, rgba(255,255,255,0.26), rgba(255,255,255,0));
      animation: skyDrift 18s ease-in-out infinite alternate;
      opacity: 1;
    }
    .background-stage::after {
      content: '';
      position: absolute;
      top: -8rem;
      left: 50%;
      width: min(70vw, 48rem);
      height: 24rem;
      transform: translateX(-50%);
      background: radial-gradient(circle at center, rgba(255,255,255,0.78), rgba(230,202,166,0.34) 42%, transparent 74%);
      filter: blur(12px);
      opacity: 0.92;
    }

    .bg-orb,
    .bg-ring,
    .bg-sweep,
    .bg-sparkles {
      position: absolute;
    }

    .bg-orb {
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.72;
      mix-blend-mode: multiply;
    }
    .bg-orb.orb-a {
      width: 34rem;
      height: 34rem;
      top: -10rem;
      left: -2rem;
      background: radial-gradient(circle, rgba(214,182,143,0.62), rgba(214,182,143,0.22) 48%, transparent 74%);
      animation: orbFloatA 16s ease-in-out infinite alternate;
    }
    .bg-orb.orb-b {
      width: 26rem;
      height: 26rem;
      top: 24%;
      right: -7rem;
      background: radial-gradient(circle, rgba(196,168,130,0.5), rgba(196,168,130,0.16) 52%, transparent 74%);
      animation: orbFloatB 20s ease-in-out infinite alternate;
    }
    .bg-orb.orb-c {
      width: 22rem;
      height: 22rem;
      bottom: -5rem;
      left: 28%;
      background: radial-gradient(circle, rgba(160,130,90,0.42), rgba(160,130,90,0.14) 48%, transparent 72%);
      animation: orbFloatC 22s ease-in-out infinite alternate;
    }

    .bg-ring {
      border: 1.5px solid rgba(196,168,130,0.32);
      border-radius: 50%;
      opacity: 0.8;
    }
    .bg-ring.ring-a {
      width: min(75vw, 52rem);
      height: min(75vw, 52rem);
      top: -14rem;
      right: -8rem;
      animation: ringDrift 28s linear infinite;
    }
    .bg-ring.ring-b {
      width: min(58vw, 36rem);
      height: min(58vw, 36rem);
      bottom: -12rem;
      left: -10rem;
      border-color: rgba(160,130,90,0.28);
      animation: ringDriftReverse 34s linear infinite;
    }

    .bg-sweep {
      inset: -30%;
      background: linear-gradient(112deg, transparent 40%, rgba(255,255,255,0.48) 50%, transparent 60%);
      transform: rotate(8deg);
      opacity: 0.62;
      mix-blend-mode: screen;
      animation: lightSweep 24s ease-in-out infinite;
    }

    .bg-sparkles {
      inset: 0;
    }
    .bg-sparkles span {
      position: absolute;
      display: block;
      width: var(--size);
      height: var(--size);
      left: var(--x);
      top: var(--y);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,1), rgba(212,184,144,0.62) 50%, transparent 74%);
      box-shadow: 0 0 24px rgba(214,182,143,0.42);
      opacity: 0.34;
      animation:
        sparkleDrift var(--dur) ease-in-out infinite,
        sparklePulse calc(var(--dur) * 0.72) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .bg-cluster {
      position: absolute;
      width: 18rem;
      height: 10rem;
      opacity: 0.95;
    }
    .bg-cluster::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 35% 50%, rgba(255,255,255,0.96), rgba(226,196,158,0.4) 34%, transparent 72%);
      filter: blur(10px);
      animation: clusterGlow 8s ease-in-out infinite;
    }
    .bg-cluster::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 7%;
      width: 86%;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(204,173,133,0.82) 20%, rgba(255,255,255,0.98) 50%, rgba(204,173,133,0.82) 80%, transparent);
      box-shadow: 0 0 22px rgba(214,182,143,0.46);
      transform-origin: center;
      animation: clusterLine 7s ease-in-out infinite;
    }
    .bg-cluster span {
      position: absolute;
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,1), rgba(214,182,143,0.9) 56%, transparent 76%);
      box-shadow: 0 0 18px rgba(214,182,143,0.58);
      animation: clusterNode 6.5s ease-in-out infinite;
    }
    .bg-cluster span:nth-child(1) { top: 46%; left: 14%; animation-delay: -0.4s; }
    .bg-cluster span:nth-child(2) { top: 42%; left: 34%; width: 0.4rem; height: 0.4rem; animation-delay: -1.3s; }
    .bg-cluster span:nth-child(3) { top: 55%; left: 60%; width: 0.48rem; height: 0.48rem; animation-delay: -2.2s; }
    .bg-cluster span:nth-child(4) { top: 47%; left: 82%; width: 0.72rem; height: 0.72rem; animation-delay: -0.9s; }

    .bg-cluster.cluster-left {
      top: 4.25rem;
      left: 8rem;
      transform: rotate(-7deg);
    }
    .bg-cluster.cluster-right {
      top: 5rem;
      right: 6.5rem;
      transform: rotate(11deg);
    }
    .bg-cluster.cluster-side {
      width: 11rem;
      height: 14rem;
      top: 49%;
      right: 3.75rem;
      transform: rotate(76deg);
    }
    .bg-cluster.cluster-side::before {
      background: radial-gradient(circle at 40% 55%, rgba(255,255,255,0.98), rgba(219,188,148,0.42) 36%, transparent 72%);
    }

    header {
      position: relative; z-index: 10;
      text-align: center;
      padding: 70px 20px 10px;
    }
    header .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(140,90,50,0.05);
      color: #a07040;
      padding: 7px 18px; border-radius: 50px;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 2.5px; text-transform: uppercase;
      margin-bottom: 18px;
      border: 1px solid rgba(140,90,50,0.1);
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700; color: #3a2e28;
      line-height: 1.1; letter-spacing: -1px;
    }
    header h1 span {
      background: linear-gradient(135deg,#8c5a32,#b8860b,#a0522d);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gS 8s ease infinite;
    }
    @keyframes gS{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

    header p {
      margin-top: 14px; font-size: 1rem;
      color: #9a8a7c; max-width: 460px;
      margin-left: auto; margin-right: auto; line-height: 1.7;
    }
    .ornament {
      margin: 28px auto 0;
      display: flex; align-items: center; justify-content: center; gap: 14px;
    }
    .ornament .line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, #d0b890, transparent);
    }

    .grid {
      position: relative; z-index: 10;
      max-width: 1400px;
      margin: 50px auto 100px;
      padding: 0 28px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));  /* BIGGER */
      gap: 28px;
    }

    .card-wrap { perspective: 900px; }

    .card {
      position: relative; border-radius: 16px; overflow: hidden;
      background: #fff;
      border: 1px solid rgba(180,160,130,0.15);
      text-decoration: none; display: flex; flex-direction: column;
      transform-style: preserve-3d;
      transition: transform 0.15s ease, box-shadow 0.45s ease;
      cursor: pointer; will-change: transform;
      box-shadow: 0 2px 8px rgba(60,40,20,0.04), 0 8px 30px rgba(60,40,20,0.03);
    }
    .card:hover {
      box-shadow: 0 12px 40px rgba(140,90,50,0.1), 0 4px 15px rgba(60,40,20,0.06);
    }
    .card .shine {
      position: absolute; inset: 0; z-index: 4;
      pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
      background: radial-gradient(320px circle at var(--mx,50%) var(--my,50%),
        rgba(200,170,120,0.1), transparent 60%);
    }
    .card:hover .shine { opacity: 1; }

    .card .thumb {
      position: relative; width: 100%; aspect-ratio: 1/1;
      overflow: hidden; background: #f3efe9;
    }
    .card .thumb img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.23,1,0.32,1);
      display: block;
    }
    .card:hover .thumb img { transform: scale(1.06); }
    .card .thumb::after {
      content:''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 55%, rgba(255,255,255,0.85) 100%);
      pointer-events: none;
    }

    .card .number {
      position: absolute; top: 12px; left: 12px;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
      color: #8c5a32; font-weight: 700; font-size: 0.7rem;
      padding: 4px 11px; border-radius: 8px;
      border: 1px solid rgba(180,150,110,0.12); z-index: 5; letter-spacing: 1px;
    }
    .card .arrow {
      position: absolute; top: 12px; right: 12px;
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      z-index: 5; border: 1px solid rgba(180,150,110,0.12);
      opacity: 0; transform: scale(0.5) rotate(-45deg);
      transition: all 0.35s ease;
    }
    .card:hover .arrow { opacity: 1; transform: scale(1) rotate(0); }
    .arrow svg {
      width: 14px; height: 14px; stroke: #8c5a32; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .card .info { padding: 18px 20px 22px; }
    .card .info h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; font-weight: 700; color: #3a2e28; margin-bottom: 4px;
    }
    .card .info span { font-size: 0.82rem; color: #b0a090; }

    .card .accent-line {
      height: 2px;
      background: linear-gradient(to right, transparent, #c4a882, transparent);
      opacity: 0; transition: opacity 0.4s ease;
    }
    .card:hover .accent-line { opacity: 1; }

    footer {
      position: relative; z-index: 10; text-align: center;
      padding: 30px 20px; color: #c0b0a0; font-size: 0.8rem;
      border-top: 1px solid rgba(180,150,110,0.08);
    }
    footer a { color: #8c5a32; text-decoration: none; }

    @keyframes skyDrift {
      from { transform: translate3d(-1.5%, -1%, 0) scale(1); }
      to { transform: translate3d(2%, 2.5%, 0) scale(1.06); }
    }
    @keyframes orbFloatA {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(5rem, 3rem, 0) scale(1.08); }
    }
    @keyframes orbFloatB {
      from { transform: translate3d(0, 0, 0) scale(0.98); }
      to { transform: translate3d(-4rem, 5rem, 0) scale(1.1); }
    }
    @keyframes orbFloatC {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(4rem, -3rem, 0) scale(1.06); }
    }
    @keyframes ringDrift {
      from { transform: rotate(0deg) translate3d(0, 0, 0); }
      to { transform: rotate(360deg) translate3d(0, 0, 0); }
    }
    @keyframes ringDriftReverse {
      from { transform: rotate(360deg) translate3d(0, 0, 0); }
      to { transform: rotate(0deg) translate3d(0, 0, 0); }
    }
    @keyframes lightSweep {
      0%, 100% { transform: translate3d(-10%, -2%, 0) rotate(8deg); opacity: 0.34; }
      50% { transform: translate3d(10%, 3%, 0) rotate(8deg); opacity: 0.72; }
    }
    @keyframes sparkleDrift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(0.9); }
      50% { transform: translate3d(var(--drift-x), var(--drift-y), 0) scale(1.08); }
    }
    @keyframes sparklePulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }
    @keyframes clusterGlow {
      0%, 100% { transform: scale(0.92); opacity: 0.68; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes clusterLine {
      0%, 100% { transform: translate3d(-0.5rem, 0, 0) scaleX(0.92); opacity: 0.72; }
      50% { transform: translate3d(0.75rem, 0, 0) scaleX(1.06); opacity: 1; }
    }
    @keyframes clusterNode {
      0%, 100% { transform: scale(0.88); opacity: 0.6; }
      50% { transform: scale(1.28); opacity: 1; }
    }

    @media(max-width:768px){
      .grid{grid-template-columns:repeat(2,1fr);gap:16px;padding:0 14px}
      header{padding:50px 16px 10px}
      .bg-ring.ring-a { top: -14rem; right: -16rem; }
      .bg-ring.ring-b { bottom: -10rem; left: -14rem; }
      .bg-cluster.cluster-left { top: 4.5rem; left: 2rem; transform: scale(0.8) rotate(-7deg); }
      .bg-cluster.cluster-right { top: 5rem; right: 1rem; transform: scale(0.74) rotate(11deg); }
      .bg-cluster.cluster-side { top: 54%; right: -1rem; transform: scale(0.72) rotate(76deg); }
    }
    @media(max-width:480px){
      .grid{grid-template-columns:1fr}
      .bg-cluster.cluster-right,
      .bg-cluster.cluster-side { display: none; }
      .bg-cluster.cluster-left { left: 1rem; top: 4rem; transform: scale(0.72) rotate(-7deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .background-stage::before,
      .background-stage::after,
      .bg-orb,
      .bg-ring,
      .bg-sweep,
      .bg-sparkles span,
      .bg-cluster::before,
      .bg-cluster::after,
      .bg-cluster span {
        animation: none !important;
      }
    }
  </style>
</head>
<body>

<div class="background-stage" aria-hidden="true">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-orb orb-c"></div>
  <div class="bg-ring ring-a"></div>
  <div class="bg-ring ring-b"></div>
  <div class="bg-cluster cluster-left"><span></span><span></span><span></span><span></span></div>
  <div class="bg-cluster cluster-right"><span></span><span></span><span></span><span></span></div>
  <div class="bg-cluster cluster-side"><span></span><span></span><span></span><span></span></div>
  <div class="bg-sweep"></div>
  <div class="bg-sparkles" id="bg-sparkles"></div>
</div>

<canvas id="bg"></canvas>

<header>
  <div class="badge">✦ Portfolio</div>
  <h1>My <span>Web Projects</span></h1>
  <p>A curated collection of 15 handcrafted experiences — click any card to explore.</p>
  <div class="ornament">
    <div class="line"></div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3C12 3 8 7 8 12s4 9 4 9 4-5 4-9-4-9-4-9z" stroke="#c4a882" stroke-width="1.5"/><path d="M3 12h18" stroke="#c4a882" stroke-width="1.5"/></svg>
    <div class="line"></div>
  </div>
</header>

<div class="grid" id="grid"></div>

<footer>
  <p>© 2025 Your Name · Crafted with ♡ · <a href="https://github.com/yourusername" target="_blank">GitHub</a></p>
</footer>

<script>
/* ----- BUILD 15 CARDS ----- */
;(function(){
  const g=document.getElementById('grid');
  const S=`<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
  for(let i=1;i<=15;i++){
    const n=String(i).padStart(2,'0');
    g.innerHTML+=`
    <div class="card-wrap"><a class="card" href="project${i}.html">
      <span class="number">#${n}</span>
      <div class="arrow">${S}</div>
      <div class="shine"></div>
      <div class="thumb"><img src="screenshots/project${i}.png" alt="Project ${i}"/></div>
      <div class="info"><h3>Project ${i}</h3><span>Description here</span></div>
      <div class="accent-line"></div>
    </a></div>`;
  }
})();

/* ----- AMBIENT SPARKLES ----- */
;(function(){
  const host = document.getElementById('bg-sparkles');
  if(!host) return;

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isMobile = /Mobi|Android/i.test(navigator.userAgent);
  const total = reducedMotion ? 10 : (isMobile ? 16 : 28);
  const frag = document.createDocumentFragment();

  for(let i = 0; i < total; i++){
    const s = document.createElement('span');
    s.style.setProperty('--x', `${Math.random() * 100}%`);
    s.style.setProperty('--y', `${i < total * 0.65 ? Math.random() * 58 : Math.random() * 100}%`);
    s.style.setProperty('--size', `${1.8 + Math.random() * 3.4}px`);
    s.style.setProperty('--dur', `${10 + Math.random() * 12}s`);
    s.style.setProperty('--delay', `${Math.random() * -10}s`);
    s.style.setProperty('--drift-x', `${-24 + Math.random() * 48}px`);
    s.style.setProperty('--drift-y', `${-18 + Math.random() * 36}px`);
    frag.appendChild(s);
  }

  host.appendChild(frag);
})();

/* -------------------------------------------------
   GEOMETRIC BACKGROUND
   ------------------------------------------------- */
;(function(){
  const cv  = document.getElementById('bg');
  const ctx = cv.getContext('2d');
  let W, H, dpr;
  let scrollTimer = null;
  let paused = false;
  let lastT = 0;

  const isMobile = /Mobi|Android/i.test(navigator.userAgent);
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const COUNT = reducedMotion ? 18 : (isMobile ? 28 : 44);
  const MOTE_COUNT = reducedMotion ? 10 : (isMobile ? 18 : 34);
  const COMET_COUNT = reducedMotion ? 0 : (isMobile ? 1 : 2);
  const LINK_DISTANCE = isMobile ? 165 : 210;

  function resize(){
    dpr = Math.min(window.devicePixelRatio, 2);
    W = window.innerWidth;
    H = Math.max(window.innerHeight, document.documentElement.scrollHeight, document.body.scrollHeight);

    cv.width  = W * dpr;
    cv.height = H * dpr;
    cv.style.width  = W + 'px';
    cv.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    shapes.forEach(s => {
      s.x = Math.random() * W;
      s.y = Math.random() * H;
    });
    motes.forEach(m => {
      m.x = Math.random() * W;
      m.y = Math.random() * H;
    });
    comets.forEach((c, i) => resetComet(c, i * 4000));
  }

  window.addEventListener('resize', resize);
  window.addEventListener('load', resize);

  window.addEventListener('scroll', function(){
    paused = true;
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(function(){ paused = false; }, 150);
  }, {passive: true});

  function drawShape(type, x, y, r, rot){
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.beginPath();

    switch(type){
      case 0:
        for(let i=0;i<3;i++){
          const a = (Math.PI*2/3)*i - Math.PI/2;
          i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
                : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        }
        ctx.closePath();
        break;
      case 1:
        ctx.rect(-r*0.7, -r*0.7, r*1.4, r*1.4);
        break;
      case 2:
        ctx.moveTo(0, -r);
        ctx.lineTo(r*0.6, 0);
        ctx.lineTo(0, r);
        ctx.lineTo(-r*0.6, 0);
        ctx.closePath();
        break;
      case 3:
        for(let i=0;i<6;i++){
          const a = (Math.PI*2/6)*i - Math.PI/6;
          i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
                : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        }
        ctx.closePath();
        break;
      case 4:
        ctx.arc(0, 0, r, 0, Math.PI*2);
        break;
      case 5:
        const t = r * 0.22;
        ctx.moveTo(-t, -r); ctx.lineTo(t, -r);
        ctx.lineTo(t, -t);  ctx.lineTo(r, -t);
        ctx.lineTo(r, t);   ctx.lineTo(t, t);
        ctx.lineTo(t, r);   ctx.lineTo(-t, r);
        ctx.lineTo(-t, t);  ctx.lineTo(-r, t);
        ctx.lineTo(-r, -t); ctx.lineTo(-t, -t);
        ctx.closePath();
        break;
    }
    ctx.restore();
  }

  const shapes = [];
  const motes = [];
  const comets = [];
  const colors = [
    'rgba(160,130,90,',
    'rgba(140,115,80,',
    'rgba(180,150,110,',
    'rgba(120,100,70,'
  ];

  for(let i = 0; i < COUNT; i++){
    shapes.push({
      type:    Math.floor(Math.random() * 6),
      x:       Math.random() * 1500,
      y:       Math.random() * 3000,
      r:       18 + Math.random() * 35,
      rot:     Math.random() * Math.PI * 2,
      dx:      (Math.random() - 0.5) * 0.12,
      dy:      (Math.random() - 0.5) * 0.1,
      dr:      (Math.random() - 0.5) * 0.0015,
      opacity: 0.14 + Math.random() * 0.12,
      color:   colors[Math.floor(Math.random() * colors.length)]
    });
  }

  for(let i = 0; i < MOTE_COUNT; i++){
    motes.push({
      x: Math.random() * 1500,
      y: Math.random() * 3000,
      r: 1.5 + Math.random() * 4.5,
      dx: (Math.random() - 0.5) * 0.08,
      dy: -0.02 - Math.random() * 0.05,
      opacity: 0.1 + Math.random() * 0.12,
      pulse: Math.random() * Math.PI * 2
    });
  }

  function resetComet(comet, delay = Math.random() * 9000){
    comet.x = -180 - Math.random() * 260;
    comet.y = Math.random() * Math.max(H * 0.7, 320);
    comet.len = 110 + Math.random() * 120;
    comet.speed = 0.7 + Math.random() * 0.6;
    comet.thickness = 1 + Math.random() * 1.6;
    comet.opacity = 0.14 + Math.random() * 0.12;
    comet.delay = delay;
  }

  for(let i = 0; i < COMET_COUNT; i++){
    const comet = {};
    resetComet(comet, i * 3600);
    comets.push(comet);
  }

  function frame(t){
    requestAnimationFrame(frame);

    if(paused){ lastT = t; return; }

    const dt = lastT ? Math.min(t - lastT, 50) : 16;
    lastT = t;

    ctx.clearRect(0, 0, W, H);

    for(let i = 0; i < motes.length; i++){
      const m = motes[i];
      m.x += m.dx * (dt / 16);
      m.y += m.dy * (dt / 16);
      m.pulse += 0.018 * (dt / 16);

      if(m.y < -20) m.y = H + 20;
      if(m.x < -20) m.x = W + 20;
      if(m.x > W + 20) m.x = -20;

      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${m.opacity + Math.sin(m.pulse) * 0.018})`;
      ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
      ctx.fill();
    }

    for(let i = 0; i < shapes.length; i++){
      const a = shapes[i];
      for(let j = i + 1; j < shapes.length; j++){
        const b = shapes[j];
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const dist = Math.hypot(dx, dy);
        if(dist < LINK_DISTANCE){
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(196,168,130,${(1 - dist / LINK_DISTANCE) * 0.1})`;
          ctx.lineWidth = 0.85;
          ctx.stroke();
        }
      }
    }

    for(let i = 0; i < shapes.length; i++){
      const s = shapes[i];

      s.x   += s.dx * (dt / 16);
      s.y   += s.dy * (dt / 16);
      s.rot += s.dr * (dt / 16);

      if(s.x < -60) s.x = W + 60;
      if(s.x > W + 60) s.x = -60;
      if(s.y < -60) s.y = H + 60;
      if(s.y > H + 60) s.y = -60;

      drawShape(s.type, s.x, s.y, s.r, s.rot);
      ctx.strokeStyle = s.color + s.opacity + ')';
      ctx.lineWidth = 1.6;
      ctx.stroke();
    }

    for(let i = 0; i < comets.length; i++){
      const c = comets[i];
      if(c.delay > 0){
        c.delay -= dt;
        continue;
      }

      c.x += c.speed * (dt / 16) * 5.2;
      c.y += c.speed * (dt / 16) * 1.45;

      const gx = c.x + c.len;
      const gy = c.y - c.len * 0.28;
      const grad = ctx.createLinearGradient(c.x, c.y, gx, gy);
      grad.addColorStop(0, `rgba(255,255,255,${c.opacity * 1.2})`);
      grad.addColorStop(0.45, `rgba(214,182,143,${c.opacity})`);
      grad.addColorStop(1, 'rgba(214,182,143,0)');

      ctx.beginPath();
      ctx.strokeStyle = grad;
      ctx.lineWidth = c.thickness;
      ctx.lineCap = 'round';
      ctx.moveTo(c.x, c.y);
      ctx.lineTo(gx, gy);
      ctx.stroke();

      if(c.x - c.len > W + 220 || c.y > H + 180){
        resetComet(c);
      }
    }
  }

  resize();
  requestAnimationFrame(frame);
})();

/* ----- 3D CARD TILT ----- */
document.querySelectorAll('.card').forEach(card=>{
  const shine=card.querySelector('.shine');
  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect();
    const x=e.clientX-r.left, y=e.clientY-r.top;
    const cx=r.width/2, cy=r.height/2;
    card.style.transform=
      `rotateX(${((y-cy)/cy*-5).toFixed(2)}deg) rotateY(${((x-cx)/cx*5).toFixed(2)}deg) scale3d(1.03,1.03,1.03)`;
    if(shine){
      shine.style.setProperty('--mx',(x/r.width*100)+'%');
      shine.style.setProperty('--my',(y/r.height*100)+'%');
    }
  });
  card.addEventListener('mouseleave',()=>{
    card.style.transform='rotateX(0) rotateY(0) scale3d(1,1,1)';
  });
});

/* ----- SCROLL REVEAL ----- */
const obs=new IntersectionObserver(entries=>{
  entries.forEach(en=>{
    if(en.isIntersecting){
      en.target.style.opacity='1';
      en.target.style.transform='translateY(0)';
    }
  });
},{threshold:0.12});

document.querySelectorAll('.card-wrap').forEach((w,i)=>{
  w.style.opacity='0';
  w.style.transform='translateY(35px)';
  w.style.transition=`opacity 0.6s ease ${i*0.06}s, transform 0.6s ease ${i*0.06}s`;
  obs.observe(w);
});
</script>
